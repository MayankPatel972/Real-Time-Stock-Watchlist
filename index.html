<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Gold | Premium Market Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>CRYPTO<span>GOLD</span></h1>
        <p class="subtitle">Premium Market Analytics • Real-time ₹ INR</p>
    </header>

    <div class="search-container glass-panel">
        <input type="text" id="search-input" placeholder="Search Assets (Bitcoin, ETH, Solana)...">
        <button id="refresh-btn">REFRESH DATA</button>
    </div>

    <div class="market-grid" id="crypto-list">
        <div class="loading">Fetching Premium Market Data...</div>
    </div>
</div>

<div id="coin-modal" class="modal">
    <div class="modal-content gold-panel">
        <span class="close-btn">&times;</span>
        <div id="modal-details">
            </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
